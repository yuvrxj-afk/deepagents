# Advisory check: posts a comment on Code release PRs when the deepagents
# SDK pin drifts from the actual SDK version. Does not block merge — the
# release workflow enforces the pin at publish time. Removes the comment
# once resolved.
# See also: release.yml "Verify package pins latest SDK version" step (hard
# gate).

name: "🔗 Check SDK Pin"

on:
  pull_request:
    paths:
      - "libs/deepagents/pyproject.toml"
      - "libs/code/pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-sdk-pin:
    if: startsWith(github.head_ref, 'release-please--branches--main--components--deepagents-code')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve target package from release-please branch
        id: pkg
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          case "$HEAD_REF" in
            release-please--branches--main--components--deepagents-code*)
              echo "name=deepagents-code" >> "$GITHUB_OUTPUT"
              echo "label=Code" >> "$GITHUB_OUTPUT"
              echo "pyproject=libs/code/pyproject.toml" >> "$GITHUB_OUTPUT"
              echo "lockdir=libs/code" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unexpected head_ref: $HEAD_REF"
              exit 1
              ;;
          esac

      - name: Compare SDK version to package pin
        id: check
        env:
          PKG_PYPROJECT: ${{ steps.pkg.outputs.pyproject }}
        run: |
          SDK_VERSION=$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)".*/\1/p' libs/deepagents/pyproject.toml | head -1)
          if [[ -z "$SDK_VERSION" ]]; then
            echo "::error file=libs/deepagents/pyproject.toml::Failed to extract SDK version. Expected a line matching: version = \"X.Y.Z\""
            exit 1
          fi

          PKG_SDK_PIN=$(sed -nE 's/.*deepagents==([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' "$PKG_PYPROJECT" | head -1)
          if [[ -z "$PKG_SDK_PIN" ]]; then
            echo "::error file=${PKG_PYPROJECT}::Failed to extract SDK pin. Expected a dependency matching: deepagents==X.Y.Z"
            exit 1
          fi

          echo "sdk_version=$SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_pin=$PKG_SDK_PIN" >> "$GITHUB_OUTPUT"
          echo "match=$( [ "$SDK_VERSION" = "$PKG_SDK_PIN" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Manage PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SDK_VERSION: ${{ steps.check.outputs.sdk_version }}
          PKG_PIN: ${{ steps.check.outputs.pkg_pin }}
          PIN_MATCH: ${{ steps.check.outputs.match }}
          PKG_NAME: ${{ steps.pkg.outputs.name }}
          PKG_LABEL: ${{ steps.pkg.outputs.label }}
          PKG_PYPROJECT: ${{ steps.pkg.outputs.pyproject }}
          PKG_LOCKDIR: ${{ steps.pkg.outputs.lockdir }}
        with:
          script: |
            // Hidden HTML marker to identify comments posted by this workflow.
            // Scoped per-package so each release PR gets its own comment if
            // additional packages are added to this check.
            const pkgName = process.env.PKG_NAME;
            const pkgLabel = process.env.PKG_LABEL;
            const pkgPyproject = process.env.PKG_PYPROJECT;
            const pkgLockdir = process.env.PKG_LOCKDIR;
            const marker = `<!-- sdk-pin-check:${pkgName} -->`;
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 },
            );
            const existing = comments.find(c => (c.body ?? '').includes(marker));

            const match = process.env.PIN_MATCH === 'true';
            const sdkVersion = process.env.SDK_VERSION;
            const pkgPin = process.env.PKG_PIN;

            if (!sdkVersion || !pkgPin) {
              core.setFailed(
                `Version extraction returned empty values. SDK: "${sdkVersion}", ${pkgLabel} pin: "${pkgPin}". ` +
                `Check that libs/deepagents/pyproject.toml and ${pkgPyproject} have the expected format.`
              );
              return;
            }

            if (match && existing) {
              try {
                await github.rest.issues.deleteComment({
                  owner, repo,
                  comment_id: existing.id,
                });
                core.info('Pin matches — removed stale warning comment.');
              } catch (error) {
                // 404 = comment was already deleted (concurrent run or manual removal)
                if (error.status === 404) {
                  core.info('Stale comment already deleted.');
                } else {
                  core.warning(
                    `Failed to delete stale SDK pin warning comment (${error.status}): ${error.message}. ` +
                    'The outdated warning may still be visible on the PR.'
                  );
                }
              }
            } else if (match) {
              core.info(`SDK pin matches: deepagents==${sdkVersion}. No action needed.`);
            } else {
              const body = [
                marker,
                '> [!WARNING]',
                `> **SDK pin mismatch** — the ${pkgLabel} release workflow will fail at the "Verify package pins latest SDK version" step until this is resolved.`,
                '>',
                '> | | Version |',
                '> |---|---|',
                `> | SDK (\`libs/deepagents/pyproject.toml\`) | \`${sdkVersion}\` |`,
                `> | ${pkgLabel} pin (\`${pkgPyproject}\`) | \`${pkgPin}\` |`,
                '>',
                `> **To fix:** update \`${pkgPyproject}\` to pin \`deepagents==${sdkVersion}\`, then run \`cd ${pkgLockdir} && uv lock\` and commit the lockfile update.`,
                '>',
                `> **To bypass:** if you intentionally need to pin an older SDK version, re-run the release workflow with \`dangerous-skip-sdk-pin-check\` enabled. Ensure the ${pkgLabel} does not contain any code that depends on functionality introduced in the newer SDK version — otherwise the published package will fail at runtime.`,
                '>',
                '> See [`.github/RELEASING.md`](https://github.com/langchain-ai/deepagents/blob/main/.github/RELEASING.md#release-failed-code-sdk-pin-mismatch) for the full recovery procedure.',
              ].join('\n');

              try {
                // Update silently (no workflow annotation) to avoid repeated warnings on re-pushes.
                if (existing) {
                  await github.rest.issues.updateComment({
                    owner, repo,
                    comment_id: existing.id,
                    body,
                  });
                  core.info('Updated existing warning comment.');
                } else {
                  await github.rest.issues.createComment({
                    owner, repo,
                    issue_number: prNumber,
                    body,
                  });
                }
              } catch (error) {
                core.warning(
                  `Could not post/update PR comment (status ${error.status}): ${error.message}. ` +
                  `The mismatch still exists: ${pkgLabel} pins deepagents==${pkgPin} but SDK is ${sdkVersion}.`
                );
              }
              // Always emit annotation regardless of comment success.
              core.warning(`${pkgLabel} pins deepagents==${pkgPin} but SDK is ${sdkVersion}`);
            }
